# vim:fileencoding=utf-8:foldmethod=marker

# Theme: Catppuccin Mocha
include catppuccin-mocha.conf

# Font, run `kitty +list-fonts`
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 14.0

# URL styling & handling
url_color #0087bd
url_style curly
open_url_with default

# Copy
copy_on_select yes

# Window
window_alert_on_bell no

# Enable when using tiling window manager like i3 or hyprland
# hide_window_decorations yes

# Ternminal Background
background_opacity 0.8
background_blur 40

# Tabs
tab_bar_style powerline
tab_powerline_style round

# Mouse
mouse_hide_wait -3.0

# Key bindings
map super+left neighboring_window left
map super+right neighboring_window right
map super+up neighboring_window up
map super+down neighboring_window down


map super+shift+left move_window left
map super+shift+right move_window right
map super+shift+up move_window up
map super+shift+down move_window down

#  Starting shell
#  User default: shell .
shell nu

